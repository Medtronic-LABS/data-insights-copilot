# =============================================================================
# Data Dictionary Configuration
# =============================================================================
# This file maps business terms, synonyms, and default filters to database
# schema elements. It is loaded by the DataDictionary service and injected
# into SQL generation prompts for schema-aware, semantically grounded queries.
#
# INSTRUCTIONS:
# - Add your domain-specific definitions below
# - Restart the backend or call DataDictionary.reload() to pick up changes
# - Use lowercase keys for case-insensitive matching
# =============================================================================

# -----------------------------------------------------------------------------
# Business Definitions
# Maps business terms to their schema-level meaning (table + condition)
# Used to resolve ambiguous user questions to precise SQL conditions
# -----------------------------------------------------------------------------
business_definitions:
  active patient:
    table: patient_tracker
    condition: "is_active = true AND is_deleted = false"
    description: "A patient who is currently enrolled and not soft-deleted"

  screened patient:
    table: patient_tracker
    condition: "is_screening = true"
    description: "A patient who has undergone the initial screening process"

  enrolled patient:
    table: patient_tracker
    condition: "is_enrolled = true AND is_active = true AND is_deleted = false"
    description: "A patient successfully enrolled in the program"

  diagnosed patient:
    table: patient_tracker
    condition: "is_confirmed_diagnosis = true"
    description: "A patient with a confirmed medical diagnosis"

  # Add more definitions for your domain...
  # controlled diabetic:
  #   table: patient_tracker
  #   condition: "is_regular_diabetic_patient = true AND ..."
  #   description: "..."

# -----------------------------------------------------------------------------
# Metric Templates
# Pre-defined SQL expressions for common analytical metrics
# These are injected into prompts when the user asks for specific metrics
# -----------------------------------------------------------------------------
metric_templates:
  screening_rate:
    expression: "COUNT(DISTINCT CASE WHEN is_screening = true THEN id END) * 100.0 / NULLIF(COUNT(DISTINCT id), 0)"
    description: "Percentage of patients who have been screened"
    tables: ["patient_tracker"]

  enrollment_rate:
    expression: "COUNT(DISTINCT CASE WHEN is_enrolled = true THEN id END) * 100.0 / NULLIF(COUNT(DISTINCT CASE WHEN is_screening = true THEN id END), 0)"
    description: "Percentage of screened patients who have been enrolled"
    tables: ["patient_tracker"]

  # Add more metric templates...
  # control_rate:
  #   expression: "..."
  #   description: "..."

# -----------------------------------------------------------------------------
# Synonyms
# Maps user-facing terms to canonical schema references
# Format: canonical_term: [list_of_aliases]
# -----------------------------------------------------------------------------
synonyms:
  patient_tracker:
    - "patients"
    - "patient table"
    - "patient data"
    - "patient records"

  site:
    - "facility"
    - "health facility"
    - "clinic"
    - "health center"

  organization:
    - "org"
    - "organisation"

  patient_visit:
    - "visits"
    - "patient visits"
    - "clinical visits"

  patient_lab_test:
    - "lab tests"
    - "laboratory tests"
    - "labs"
    - "test results"

  patient_diagnosis:
    - "diagnoses"
    - "diagnosis records"
    - "conditions"

  is_screening:
    - "screened"
    - "screening status"

  is_enrolled:
    - "enrolled"
    - "enrollment status"

  # Add more synonyms for your domain...

# -----------------------------------------------------------------------------
# Default Filters
# Mandatory WHERE clause conditions applied per table unless user says otherwise
# These prevent common mistakes like including deleted records
# -----------------------------------------------------------------------------
default_filters:
  patient_tracker:
    - "is_active = true"
    - "is_deleted = false"

  # Add more default filters for other tables...
  # patient_visit:
  #   - "is_deleted = false"

# -----------------------------------------------------------------------------
# Table Descriptions
# Human-readable descriptions for tables (injected into prompts)
# -----------------------------------------------------------------------------
table_descriptions:
  patient_tracker: "Main patient registry with demographics, enrollment status, and clinical flags"
  patient_visit: "Records of patient visits to health facilities"
  patient_diagnosis: "Confirmed diagnoses for patients"
  patient_lab_test: "Laboratory test records for patients"
  patient_lab_test_result: "Results of laboratory tests"
  patient_treatment_plan: "Treatment plans assigned to patients"
  site: "Health facilities / clinics where patients are seen"
  organization: "Organizations managing health facilities"
  region: "Geographic regions"
  district: "Districts within regions"
  # Add descriptions for your other tables...

# -----------------------------------------------------------------------------
# Column Semantics
# Human-readable descriptions for important columns (helps LLM understand data)
# Format: table_name: {column_name: description}
# -----------------------------------------------------------------------------
column_semantics:
  patient_tracker:
    is_active: "Whether the patient record is currently active (not deactivated)"
    is_deleted: "Soft-delete flag — true means the record should be excluded"
    is_screening: "Whether the patient has completed initial screening"
    is_enrolled: "Whether the patient has been enrolled in the program"
    is_confirmed_diagnosis: "Whether the patient has a confirmed diagnosis"
    cvd_risk_level: "Cardiovascular disease risk level (categorical)"
    gender: "Patient gender (Male/Female)"

  site:
    name: "Name of the health facility"
    site_type: "Type of facility (e.g., Clinic, Hospital)"

  # Add column semantics for your other tables...
